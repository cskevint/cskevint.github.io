<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>List Manager</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["\"JetBrains Mono\"", "Menlo", "monospace"],
          },
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Underscore.js (set operations: union, intersection, difference) -->
  <script src="https://underscorejs.org/underscore-umd-min.js"></script>

  <style>
    textarea { resize: vertical; }
    textarea:focus { outline: none; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #results b { font-weight: 700; }
  </style>

  <script>
    /* ── Join undo history ───────────────────────────────── */
    let joinHistory = [];

    /* ── Helpers ──────────────────────────────────────────── */
    function htmlEntities(str) {
      return String(str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function isCaseSensitive() { return document.getElementById("caseSensitive").checked; }
    function showCounts()      { return document.getElementById("showCounts").checked; }

    function getData() {
      const raw = document.getElementById("data").value.split("\n").filter(d => d.length > 0);
      return isCaseSensitive() ? raw : raw.map(d => d.toLowerCase());
    }
    function getExtra() {
      const raw = document.getElementById("extra").value.split("\n").filter(d => d.length > 0);
      return isCaseSensitive() ? raw : raw.map(d => d.toLowerCase());
    }

    /* ── Results ──────────────────────────────────────────── */
    function writeResults(processed, keepHTML) {
      const el = document.getElementById("results");
      if (!processed.length) { el.innerHTML = ""; el.classList.add("hidden"); return; }
      el.classList.remove("hidden");
      el.innerHTML = keepHTML
        ? processed.join("<br/>")
        : processed.map(o => htmlEntities(o)).join("<br/>");
      document.getElementById("copyToClipboard").disabled = false;
    }

    /* ── Toggle comparison pane ───────────────────────────── */
    function extraDataChange(checked) {
      const extraEl   = document.getElementById("extra");
      const extraWrap = document.getElementById("extraWrap");
      extraEl.disabled = !checked;
      extraWrap.classList.toggle("hidden", !checked);
      const solo = ["join", "unique", "duplicates", "reverse", "runFn", "dividerWrap", "columnize", "showCountsBtn"];
      const set  = ["union", "intersection", "difference"];
      solo.forEach(id => { document.getElementById(id).classList.toggle("hidden", checked); });
      set .forEach(id => { document.getElementById(id).classList.toggle("hidden", !checked); });
    }

    /* ── Operations ───────────────────────────────────────── */
    function uniqueClick() {
      const counts = getData().reduce((h, k) => { h[k] = (h[k] || 0) + 1; return h; }, {});
      writeResults(_.pairs(counts).map(d =>
        d[0] + (d[1] > 1 && showCounts() ? " <b>(" + d[1] + ")</b>" : "")), true);
    }
    function duplicatesClick() {
      const counts = getData().reduce((h, k) => { h[k] = (h[k] || 0) + 1; return h; }, {});
      writeResults(_.pairs(counts).filter(d => d[1] > 1).map(d =>
        d[0] + (showCounts() ? " <b>(" + d[1] + ")</b>" : "")), true);
    }
    function unionClick()        { writeResults(_.union(getData(), getExtra())); }
    function intersectionClick() { writeResults(_.intersection(getData(), getExtra())); }
    function differenceClick()   { writeResults(_.difference(getData(), getExtra())); }
    function reverseClick()      { writeResults(getData().reverse()); }

    function columnizeClick() {
      const data    = getData();
      const divider = document.getElementById("divider").value;
      const results = [];
      for (let i = 0; i < data.length; i += 2) {
        results.push([(data[i] != null ? data[i] : ""), (data[i+1] != null ? data[i+1] : "")].join(divider));
      }
      writeResults(results);
    }

    function runFunction() {
      const mapFunction = document.getElementById("functionCode").value;
      const funcObject  = new Function(mapFunction);
      writeResults(getData().map(o => funcObject.call(null, o)));
    }

    function joinLines() {
      const ta = document.getElementById("data");
      joinHistory.push(ta.value);
      let joined = ta.value.replace(/\n\n/ig, "A1B2C3D4E5");
      joined = joined.replace(/\n/ig, " ");
      joined = joined.replace(/A1B2C3D4E5/ig, "\n\n");
      ta.value = joined;
      navigator.clipboard.writeText(joined);
      flashCopyBtn(document.getElementById("copyToClipboard"), true);
    }

    function clearClick() {
      joinHistory = [];
      document.getElementById("extraData").checked = false;
      document.getElementById("caseSensitive").checked = true;
      extraDataChange(false);
      ["data", "extra"].forEach(id => { document.getElementById(id).value = ""; });
      const results = document.getElementById("results");
      results.innerHTML = "";
      results.classList.add("hidden");
      document.getElementById("copyToClipboard").disabled = true;
      updateWordCount();
    }

    function copyToClipboardClick() {
      const text = document.getElementById("results").innerText;
      navigator.clipboard.writeText(text);
      flashCopyBtn(document.getElementById("copyToClipboard"), false);
    }

    function flashCopyBtn(btn, keepEnabled) {
      const lbl = btn.querySelector(".btn-lbl") || btn;
      const orig = lbl.textContent;
      btn.disabled = !keepEnabled;
      lbl.textContent = "Copied!";
      setTimeout(() => {
        btn.disabled   = keepEnabled ? btn.disabled : false;
        lbl.textContent = orig;
      }, 1200);
    }

    /* ── Word count ───────────────────────────────────────── */
    function updateWordCount() {
      const count = document.getElementById("data").value
        .trim().split(/\s+/).filter(w => w !== "").length;
      document.getElementById("count").textContent = count;
    }

    /* ── Init ─────────────────────────────────────────────── */
    document.addEventListener("DOMContentLoaded", () => {
      updateWordCount();
      document.getElementById("data").addEventListener("input", updateWordCount);
      document.getElementById("extraData").addEventListener("change", e => extraDataChange(e.target.checked));
      document.addEventListener("keydown", e => {
        if ((e.metaKey || e.ctrlKey) && e.key === "z" && joinHistory.length > 0) {
          e.preventDefault();
          document.getElementById("data").value = joinHistory.pop();
          updateWordCount();
        }
      });
    });
  </script>
</head>

<body class="min-h-screen bg-gray-50 font-sans text-gray-800 antialiased">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="bg-white border-b border-gray-200 px-4 py-3 sm:px-6">
    <div class="max-w-6xl mx-auto flex items-center gap-3">
      <div>
        <h1 class="text-base font-semibold text-gray-900 tracking-tight leading-none">List Manager</h1>
        <p class="text-[11px] text-gray-400 mt-0.5">Transform &amp; compare text lists</p>
      </div>
    </div>
  </header>

  <!-- ── Toolbar ──────────────────────────────────────────── -->
  <div class="sticky top-0 z-20 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-2 sm:px-4 flex items-stretch">

      <!-- LEFT · Compare + Case Sensitive (pinned, never moves) -->
      <div class="flex items-center flex-shrink-0 border-r border-gray-200 pr-1 mr-1">
        <label class="tbtn flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded cursor-pointer select-none
                      text-gray-500 hover:bg-rose-50 hover:text-rose-600 has-[:checked]:bg-rose-50 has-[:checked]:text-rose-600 transition"
               title="Show a second textarea to compare two lists">
          <input id="extraData" type="checkbox" class="sr-only">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2zm0 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V7m0 10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2"/>
          </svg>
          <span class="text-[10px] font-medium leading-none">Compare</span>
        </label>
        <label class="tbtn flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded cursor-pointer select-none
                      text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 has-[:checked]:bg-indigo-50 has-[:checked]:text-indigo-600 transition"
               title="Match lines case-sensitively">
          <input id="caseSensitive" type="checkbox" checked class="sr-only">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/>
          </svg>
          <span class="text-[10px] font-medium leading-none">Aa</span>
        </label>
      </div>

      <!-- MIDDLE · Scrollable operations -->
      <div class="flex items-center gap-0.5 py-1 overflow-x-auto flex-1 min-w-0">

        <!-- GROUP 1 · Transform -->
        <button id="join" onclick="joinLines()" title="Collapse newlines into spaces (double-newlines preserved as paragraph breaks)"
          class="btn tbtn flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8h18M3 12h11m-4 4 4-4-4-4"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Join</span>
        </button>

        <button id="unique" onclick="uniqueClick()" title="Remove duplicate lines, keeping first occurrence"
          class="btn tbtn flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h13M3 8h9m-9 4h9m5-4v12m0 0-3-3m3 3 3-3"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Unique</span>
        </button>

        <button id="duplicates" onclick="duplicatesClick()" title="Show only lines that appear more than once"
          class="btn tbtn flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2m-6 12h8a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-8a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Dupes</span>
        </button>

        <button id="reverse" onclick="reverseClick()" title="Reverse the order of lines"
          class="btn tbtn flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4 4 4m6 0v12m0 0 4-4m-4 4-4-4"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Reverse</span>
        </button>

        <button id="runFn" onclick="runFunction()" title="Apply the custom JS function to each line"
          class="btn tbtn flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5 3 12l3.75 4.5M17.25 7.5 21 12l-3.75 4.5M14.25 4.5l-4.5 15"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Function</span>
        </button>

        <!-- Separator -->
        <div class="w-px h-8 bg-gray-200 mx-1 flex-shrink-0"></div>

        <!-- GROUP 2 · Set ops (shown in comparison mode only) -->
        <button id="union" onclick="unionClick()" title="All unique lines from both lists"
          class="btn tbtn hidden flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 3a6 6 0 1 0 0 12A6 6 0 0 0 9 3zm6 0a6 6 0 1 1 0 12A6 6 0 0 1 15 3z"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Union</span>
        </button>

        <button id="intersection" onclick="intersectionClick()" title="Lines that appear in both lists"
          class="btn tbtn hidden flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 3a6 6 0 1 0 0 12A6 6 0 0 0 9 3z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 3a6 6 0 1 1 0 12A6 6 0 0 1 15 3z"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Intersect</span>
        </button>

        <button id="difference" onclick="differenceClick()" title="Lines in the main list but NOT in the comparison list"
          class="btn tbtn hidden flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="9" r="6"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 6h3m-3 3h3"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Diff</span>
        </button>

        <!-- Separator -->
        <div class="w-px h-8 bg-gray-200 mx-1 flex-shrink-0"></div>

        <!-- GROUP 3 · Columnize -->
        <div id="dividerWrap" class="flex-shrink-0 flex items-center gap-1 bg-gray-50 border border-gray-200 rounded px-1.5 py-1">
          <span class="text-[10px] text-gray-400 font-medium select-none whitespace-nowrap">Divider</span>
          <select id="divider" class="text-xs bg-transparent font-mono text-gray-700 focus:outline-none cursor-pointer">
            <option value="|"> | </option>
            <option value=","> , </option>
          </select>
        </div>

        <button id="columnize" onclick="columnizeClick()" title="Joins every two lines into one using the divider (e.g. &quot;apple | banana&quot;)"
          class="btn tbtn flex-shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-gray-600 hover:bg-gray-100 active:bg-gray-200 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4M9 3h6M9 3v18m6-15h4a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-4M15 3v18"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Col &#215;2</span>
        </button>

        <!-- Separator -->
        <div class="w-px h-8 bg-gray-200 mx-1 flex-shrink-0"></div>

        <!-- GROUP 4 · Toggle options -->
        <label id="showCountsBtn" class="flex-shrink-0 tbtn flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded cursor-pointer select-none
                      text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 has-[:checked]:bg-indigo-50 has-[:checked]:text-indigo-600 transition"
               title="Show occurrence count next to duplicates">
          <input id="showCounts" type="checkbox" class="sr-only">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16 2 2-8 8m0-7 2 2M13 7l2 2m-5 5 2 2m0-7 2 2M7 17l4-4"/>
          </svg>
          <span class="text-[10px] font-medium leading-none">#&#160;Counts</span>
        </label>

      </div>

      <!-- RIGHT · Words / Copy / Clear (pinned, never moves) -->
      <div class="flex items-center flex-shrink-0 border-l border-gray-200 pl-1 ml-1 gap-0.5">
        <span class="text-[11px] text-gray-400 px-2 whitespace-nowrap">
          Words:&#160;<span id="count" class="font-semibold text-indigo-600">0</span>
        </span>

        <button id="copyToClipboard" onclick="copyToClipboardClick()" disabled
          title="Copy results to clipboard"
          class="btn tbtn flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-emerald-700 hover:bg-emerald-50 active:bg-emerald-100 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Copy</span>
        </button>

        <button onclick="clearClick()" title="Clear all data and results"
          class="btn tbtn flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded text-rose-600 hover:bg-rose-50 active:bg-rose-100 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
          </svg>
          <span class="btn-lbl text-[10px] font-medium leading-none">Clear</span>
        </button>
      </div>

    </div>
  </div>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="max-w-6xl mx-auto px-4 py-4 sm:px-6 space-y-3">

    <!-- Textareas -->
    <div class="flex flex-col sm:flex-row gap-3">

      <!-- Primary data -->
      <textarea
        id="data"
        rows="16"
        placeholder="Paste your list here (one item per line)&#8230;"
        class="flex-1 w-full font-mono text-sm bg-white border border-gray-300 rounded-lg px-3 py-2.5
               text-gray-800 placeholder-gray-300 shadow-sm
               focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
      ></textarea>

      <!-- Comparison data (hidden until toggled) -->
      <div id="extraWrap" class="hidden flex-1">
        <textarea
          id="extra"
          rows="16"
          disabled
          placeholder="Paste comparison data here&#8230;"
          class="w-full h-full font-mono text-sm bg-white border border-rose-400 rounded-lg px-3 py-2.5
                 text-gray-800 placeholder-rose-200 shadow-sm
                 focus:ring-2 focus:ring-rose-400 focus:border-rose-400 transition
                 disabled:bg-gray-100 disabled:cursor-not-allowed"
        ></textarea>
      </div>
    </div>

    <!-- Custom function (collapsible) -->
    <details id="fnSection" class="group">
      <summary class="cursor-pointer text-xs font-medium text-gray-400 uppercase tracking-wider
                      hover:text-gray-600 transition select-none list-none flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5 transition-transform group-open:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
        Custom Function
      </summary>
      <textarea
        id="functionCode"
        rows="3"
        class="mt-2 w-full font-mono text-sm bg-white border border-gray-300 rounded-lg px-3 py-2
               shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition"
      >return (arguments[0] || "").split(" ").map(o => o.substring(0,1).toUpperCase() + o.substring(1).toLowerCase()).join(" ");</textarea>
    </details>

    <!-- Results output -->
    <div id="results"
      class="hidden font-mono text-sm bg-white border border-gray-200 rounded-lg px-4 py-3.5
             shadow-sm leading-relaxed text-gray-800 whitespace-pre-wrap break-words
             max-h-80 overflow-y-auto">
    </div>

  </main>

</body>
</html>
